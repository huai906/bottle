<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍾 树洞漂流瓶</title>
    <script src="https://cdn.jsdeliver.net/npm/@cloudbase/js-sdk@1.7.0/dist/index.umd.js">
    </script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(145deg, #f0ebf5 0%, #ddd6e8 100%);
            min-height: 100vh;
            padding: 12px;
        }
        .app {
            max-width: 720px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 32px 32px 24px 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
            padding: 20px 16px 24px;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        h1 {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 24px;
            font-weight: 700;
            color: #2a1a38;
            margin-bottom: 2px;
        }
        h1 small {
            font-size: 12px;
            font-weight: 400;
            color: #6a4f7a;
            margin-left: auto;
            background: rgba(255, 255, 255, 0.5);
            padding: 3px 14px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        .sub {
            color: #4d365c;
            font-size: 13px;
            margin-bottom: 16px;
            padding: 6px 14px;
            border-left: 3px solid #b38bc9;
            background: rgba(255, 240, 245, 0.2);
            border-radius: 0 12px 12px 0;
        }
        .card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 16px 14px;
            margin-bottom: 14px;
            border: 1px solid rgba(255, 255, 255, 0.7);
        }
        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }
        .row label {
            flex: 0 0 100%;
            font-size: 13px;
            font-weight: 600;
            color: #3f2a4e;
        }
        .row input,
        .row textarea,
        .row select {
            flex: 1;
            min-width: 90px;
            padding: 10px 14px;
            border: 1px solid #d9c8e3;
            border-radius: 40px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.7);
            transition: 0.2s;
            outline: none;
            font-family: inherit;
        }
        .row input:focus,
        .row textarea:focus {
            border-color: #a67bbd;
            box-shadow: 0 0 0 3px rgba(166, 123, 189, 0.15);
            background: white;
        }
        .row textarea {
            border-radius: 16px;
            resize: vertical;
            min-height: 56px;
        }
        .row .half {
            flex: 1 1 calc(50% - 8px);
            min-width: 100px;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .btn {
            flex: 1 1 auto;
            padding: 12px 18px;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: #7d5b96;
            color: white;
            box-shadow: 0 4px 12px rgba(125, 91, 150, 0.25);
        }
        .btn-primary:active {
            background: #684a80;
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid #7d5b96;
            color: #7d5b96;
        }
        .btn-success {
            background: #2f7a5c;
            color: white;
            box-shadow: 0 4px 12px rgba(47, 122, 92, 0.2);
        }
        .btn-ghost {
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid #c6b0d4;
        }
        .btn-sm {
            padding: 5px 14px;
            font-size: 12px;
        }
        .btn-danger {
            background: #b14f6b;
            color: white;
            border: none;
        }
        .btn-danger:active {
            background: #8f3d56;
        }
        .status-tip {
            background: #f2eaf7;
            padding: 10px 16px;
            border-radius: 40px;
            text-align: center;
            color: #3f2a4e;
            font-size: 13px;
            margin: 6px 0 10px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bottle-list {
            margin-top: 14px;
            border-top: 2px dashed #d3bfdf;
            padding-top: 14px;
        }
        .bubble {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(4px);
            border-radius: 18px 18px 18px 6px;
            padding: 14px 16px;
            margin-bottom: 14px;
            border-left: 4px solid #b38bc9;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
        }
        .bubble .meta {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            font-size: 12px;
            color: #584065;
            margin-bottom: 4px;
            font-weight: 500;
            gap: 4px;
        }
        .bubble .content {
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
            color: #1f1329;
        }
        .bubble .bubble-image {
            margin-top: 8px;
            border-radius: 14px;
            overflow: hidden;
            max-width: 100%;
            cursor: pointer;
            border: 1px solid rgba(0, 0, 0, 0.06);
        }
        .bubble .bubble-image img {
            width: 100%;
            max-height: 280px;
            object-fit: contain;
            display: block;
            background: #f5f0f8;
        }
        .bubble .reply-item {
            background: rgba(240, 248, 245, 0.6);
            border-radius: 14px 14px 14px 4px;
            padding: 10px 12px;
            margin-top: 8px;
            margin-left: 8px;
            border-left: 3px solid #4f8a7a;
        }
        .bubble .reply-item.mine {
            background: rgba(235, 225, 245, 0.6);
            border-left-color: #9b7bb3;
        }
        .bubble .reply-item .rmeta {
            font-size: 11px;
            color: #4f6b5f;
            display: flex;
            justify-content: space-between;
            margin-bottom: 2px;
            font-weight: 500;
        }
        .bubble .reply-item .rcontent {
            font-size: 14px;
            line-height: 1.4;
        }
        .bubble .reply-item .reply-image {
            margin-top: 6px;
            border-radius: 10px;
            overflow: hidden;
            max-width: 100%;
            cursor: pointer;
        }
        .bubble .reply-item .reply-image img {
            width: 100%;
            max-height: 180px;
            object-fit: contain;
            display: block;
            background: #f5f0f8;
        }
        .bubble .actions {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .badge {
            background: #dac7e7;
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 10px;
            font-weight: 600;
            color: #3d284b;
        }
        .tag {
            background: #e0d4ea;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 10px;
            color: #4d365c;
        }
        .hidden-info {
            background: #ffeee0;
            border-radius: 40px;
            padding: 3px 14px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid #fad5b3;
        }
        .empty-state {
            text-align: center;
            color: #7e6193;
            padding: 20px 0;
            font-size: 14px;
        }
        .admin-panel {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 16px;
            margin-top: 16px;
            border: 2px solid #b38bc9;
            display: none;
        }
        .admin-panel.open {
            display: block;
        }
        .admin-panel h2 {
            font-size: 17px;
            color: #2a1a38;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .admin-panel h2 .close-btn {
            margin-left: auto;
            background: #dccae6;
            border: none;
            border-radius: 40px;
            padding: 3px 14px;
            cursor: pointer;
            font-size: 12px;
        }
        .admin-user-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 8px;
            margin-bottom: 12px;
        }
        .admin-user-card {
            background: rgba(255, 255, 255, 0.7);
            border-radius: 14px;
            padding: 10px 12px;
            border: 1px solid #d9c8e3;
            font-size: 13px;
        }
        .admin-user-card .name {
            font-weight: 600;
            color: #2a1a38;
        }
        .admin-user-card .detail {
            font-size: 11px;
            color: #584065;
        }
        .admin-bottle-item {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #7d5b96;
        }
        .admin-bottle-item .admin-meta {
            font-size: 12px;
            color: #584065;
            margin-bottom: 4px;
        }
        .admin-bottle-item .admin-reply {
            font-size: 12px;
            color: #3f2a4e;
            background: rgba(240, 248, 245, 0.5);
            border-radius: 10px;
            padding: 6px 10px;
            margin-top: 4px;
            margin-left: 10px;
        }
        .admin-toggle {
            margin-top: 10px;
            text-align: center;
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .admin-toggle .btn {
            flex: 0 1 auto;
            padding: 6px 20px;
            font-size: 12px;
        }
        .footer-tips {
            margin-top: 14px;
            font-size: 11px;
            color: #5b456b;
            border-top: 1px solid #dccae6;
            padding-top: 12px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .image-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 16px;
            cursor: pointer;
        }
        .image-modal.open {
            display: flex;
        }
        .image-modal img {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 10px;
        }
        .image-modal .close-modal {
            position: absolute;
            top: 16px;
            right: 20px;
            color: white;
            font-size: 28px;
            font-weight: 300;
            cursor: pointer;
            background: none;
            border: none;
            opacity: 0.7;
        }
        .reveal-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            padding: 20px;
        }
        .reveal-modal-overlay.open {
            display: flex;
        }
        .reveal-modal {
            background: white;
            border-radius: 24px;
            padding: 28px 24px 20px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .reveal-modal h3 {
            font-size: 18px;
            color: #2a1a38;
            margin-bottom: 4px;
            text-align: center;
        }
        .reveal-modal .sub {
            text-align: center;
            font-size: 13px;
            color: #8d74a0;
            margin-bottom: 16px;
            border: none;
            padding: 0;
        }
        .reveal-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid #e8e0ee;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.15s;
        }
        .reveal-option:active {
            background: #f5f0f8;
        }
        .reveal-option input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #7d5b96;
            flex-shrink: 0;
            cursor: pointer;
        }
        .reveal-option .label {
            font-size: 15px;
            color: #2a1a38;
        }
        .reveal-option .value {
            font-size: 14px;
            color: #7d5b96;
            font-weight: 500;
            margin-left: auto;
        }
        .reveal-modal .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .reveal-modal .btn-row .btn {
            flex: 1;
            padding: 12px;
            font-size: 15px;
            border-radius: 60px;
        }
        .reveal-modal .btn-row .btn-cancel {
            background: #f0ebf5;
            color: #4d365c;
            border: none;
        }
        .reveal-modal .btn-row .btn-cancel:active {
            background: #e0d4ea;
        }
        .reveal-modal .btn-row .btn-confirm {
            background: #7d5b96;
            color: white;
            border: none;
        }
        .reveal-modal .btn-row .btn-confirm:active {
            background: #684a80;
        }
        .reveal-modal .btn-row .btn-confirm:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .reveal-modal .error-msg {
            color: #b14f6b;
            font-size: 13px;
            text-align: center;
            margin-top: 8px;
            display: none;
        }
        @media (max-width: 480px) {
            .app {
                padding: 12px;
            }
            .row .half {
                flex: 1 1 100%;
            }
            .admin-user-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <h1>
            🍾 树洞漂流瓶
            <small>🌍 数据互通</small>
        </h1>
        <div class="sub">📬 投出 → 多人独立回复 → 仅投递者可见全部</div>

        <div class="card">
            <div class="row">
                <label>🧑‍🎓 你的身份</label>
                <input class="half" id="userClass" placeholder="班级" value="">
                <input class="half" id="userName" placeholder="姓名" value="">
                <input class="half" id="userId" placeholder="学号" value="">
                <select class="half" id="userGender">
                    <option value="♀ 女生">♀ 女生</option>
                    <option value="♂ 男生">♂ 男生</option>
                    <option value="⚧ 其他">⚧ 其他</option>
                </select>
            </div>
            <div class="row">
                <label>📝 写一封信</label>
                <textarea id="newMessage" placeholder="投入树洞，谁都可以回复你">今天晚霞很美 📸</textarea>
            </div>
            <div class="row">
                <label>🖼️ 配图 (可选)</label>
                <div class="image-upload-area" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:4px;">
                    <div class="preview" id="throwPreview" style="width:52px;height:52px;border-radius:12px;overflow:hidden;border:2px dashed #d9c8e3;flex-shrink:0;background:rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:20px;color:#b38bc9;">➕</div>
                    <div class="file-input-wrap" style="position:relative;overflow:hidden;display:inline-block;">
                        <button class="btn btn-ghost btn-sm">📷 选择图片</button>
                        <input type="file" id="throwImageInput" accept="image/*" capture="environment" style="position:absolute;left:0;top:0;opacity:0;width:100%;height:100%;cursor:pointer;">
                    </div>
                    <button class="remove-img" id="throwRemoveImage" style="display:none;background:transparent;border:none;color:#b14f6b;font-size:16px;cursor:pointer;padding:4px 6px;line-height:1;">✕</button>
                    <span style="font-size:11px;color:#8d74a0;">JPG/PNG</span>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" id="throwBtn">🌊 投掷</button>
                <button class="btn btn-outline" id="pickBtn">🎲 拾取</button>
            </div>
        </div>

        <div id="statusArea" class="status-tip">💡 投掷后，别人可拾取回复</div>

        <div class="bottle-list" id="bottleList">
            <div class="empty-state">🪸 加载中...</div>
        </div>

        <div class="admin-toggle">
            <button class="btn btn-outline btn-sm" id="adminToggleBtn">🔐 后台</button>
        </div>

        <div class="admin-panel" id="adminPanel">
            <h2>
                📊 后台管理
                <button class="close-btn" id="adminCloseBtn">✕ 关闭</button>
            </h2>
            <div id="adminContent"><p style="color:#6a4f7a;">加载中...</p></div>
            <div style="margin-top:16px;text-align:center;">
                <button class="btn btn-danger btn-sm" id="clearDataBtn" style="padding:8px 24px;">🗑️ 清空所有数据</button>
                <p style="font-size:11px;color:#8d74a0;margin-top:4px;">⚠️ 此操作不可恢复，请谨慎操作</p>
            </div>
        </div>

        <div class="footer-tips">
            <span>🔹 回复者只看到自己的对话</span>
            <span>🔹 A 看到所有人回复</span>
            <span style="margin-left:auto;color:#9a8aaa;">☁️ 云端存储</span>
        </div>
    </div>

    <div class="image-modal" id="imageModal" onclick="this.classList.remove('open')">
        <button class="close-modal" onclick="document.getElementById('imageModal').classList.remove('open')">✕</button>
        <img id="modalImage" src="" alt="预览">
    </div>

    <div class="reveal-modal-overlay" id="revealModal">
        <div class="reveal-modal">
            <h3>🔓 选择要揭晓的信息</h3>
            <div class="sub">勾选你愿意向对方公开的内容</div>
            <div id="revealOptions">
                <div class="reveal-option" data-field="class">
                    <input type="checkbox" id="revealClass">
                    <span class="label">📚 班级</span>
                    <span class="value" id="revealClassValue">-</span>
                </div>
                <div class="reveal-option" data-field="name">
                    <input type="checkbox" id="revealName">
                    <span class="label">👤 姓名</span>
                    <span class="value" id="revealNameValue">-</span>
                </div>
                <div class="reveal-option" data-field="gender">
                    <input type="checkbox" id="revealGender">
                    <span class="label">⚥ 性别</span>
                    <span class="value" id="revealGenderValue">-</span>
                </div>
            </div>
            <div class="error-msg" id="revealError">⚠️ 请至少选择一项</div>
            <div class="btn-row">
                <button class="btn btn-cancel" id="revealCancelBtn">取消</button>
                <button class="btn btn-confirm" id="revealConfirmBtn">✅ 确认揭晓</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  🍾 树洞漂流瓶 · 腾讯云开发版（数据互通）
        //  环境 ID：bottle-d9gpcqa9hbcbcfc0c-144
        //  后台密码：Syx0701！
        // ============================================================

        (function() {

            // ===== 1. 初始化腾讯云开发 =====
            var app = tcb.init({
                env: 'bottle-d9gpcqa9hcbccfe0c'
            });

            var db = app.database();
            var _ = db.command;

            // ===== 2. 匿名登录 =====
            var auth = app.auth({
                persistence: 'local'
            });

            // ===== 3. 全局状态 =====
            var currentUser = null;
            var isLogin = false;
            var ADMIN_PASSWORD = 'Syx0701！';
            var STORAGE_KEY = 'bottle_user_info';
            var userInfo = null;
            var pendingReveal = null;
            var throwImageData = null;
            var replyImageData = {};
            var allBottles = [];

            // ===== 4. DOM 引用 =====
            function $(id) { return document.getElementById(id); }
            var bottleListEl = $('bottleList');
            var statusEl = $('statusArea');
            var throwBtn = $('throwBtn');
            var pickBtn = $('pickBtn');
            var newMessageEl = $('newMessage');
            var adminPanel = $('adminPanel');
            var adminContent = $('adminContent');
            var throwPreview = $('throwPreview');
            var throwImageInput = $('throwImageInput');
            var throwRemoveImage = $('throwRemoveImage');
            var modal = $('imageModal');
            var modalImg = $('modalImage');
            var revealModal = $('revealModal');

            // ===== 5. 工具函数 =====
            function status(msg, good) {
                good = (good !== undefined) ? good : true;
                statusEl.innerHTML = msg;
                statusEl.style.background = good ? '#f2eaf7' : '#ffebee';
                statusEl.style.color = good ? '#3f2a4e' : '#a13d4a';
            }

            function getCurrentUser() {
                return {
                    className: $('userClass').value.trim() || '未知班级',
                    name: $('userName').value.trim() || '匿名',
                    id: $('userId').value.trim() || '0000',
                    gender: $('userGender').value || '未知'
                };
            }

            function getDisplayName(user, revealedData) {
                if (!revealedData) return '🫥 匿名 (' + user.gender + ')';
                var parts = [];
                if (revealedData.class) parts.push(revealedData.class);
                if (revealedData.name) parts.push(revealedData.name);
                if (revealedData.gender) parts.push(revealedData.gender);
                if (parts.length === 0) return '🫥 匿名 (' + user.gender + ')';
                return '📌 ' + parts.join(' · ');
            }

            function isSamePerson(a, b) {
                if (!a || !b) return false;
                return a.className === b.className && a.name === b.name && a.id === b.id;
            }

            function cloneObj(o) {
                return JSON.parse(JSON.stringify(o));
            }

            function genId() {
                return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
            }

            // ===== 6. 图片处理 =====
            window.openImage = function(data) {
                modalImg.src = data;
                modal.classList.add('open');
            };

            function compressImage(file, maxSize) {
                maxSize = maxSize || 1.5 * 1024 * 1024;
                return new Promise(function(resolve) {
                    if (file.size < maxSize) {
                        var reader = new FileReader();
                        reader.onload = function(e) { resolve(e.target.result); };
                        reader.readAsDataURL(file);
                        return;
                    }
                    var reader = new FileReader();
                    reader.onload = function(e) {
                        var img = new Image();
                        img.onload = function() {
                            var canvas = document.createElement('canvas');
                            var w = img.width,
                                h = img.height;
                            var maxDim = 1200;
                            if (w > maxDim || h > maxDim) {
                                var ratio = Math.min(maxDim / w, maxDim / h);
                                w = Math.round(w * ratio);
                                h = Math.round(h * ratio);
                            }
                            canvas.width = w;
                            canvas.height = h;
                            var ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, w, h);
                            resolve(canvas.toDataURL('image/jpeg', 0.85));
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            }

            function renderImage(data, cls) {
                cls = cls || '';
                if (!data) return '';
                return '<div class="' + cls + '" onclick="event.stopPropagation();openImage(\'' + data + '\')">' +
                    '<img src="' + data + '" alt="配图" loading="lazy">' +
                    '</div>';
            }

            // ===== 7. 用户信息存储 =====
            function saveUserInfo(info) {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(info));
                } catch (e) {}
            }

            function loadUserInfo() {
                try {
                    var raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) {
                        return JSON.parse(raw);
                    }
                } catch (e) {}
                return null;
            }

            // ===== 8. 登录 =====
            function login() {
                auth.signInAnonymously().then(function(res) {
                    currentUser = res.user;
                    isLogin = true;
                    console.log('✅ 匿名登录成功', currentUser);
                    loadBottles();
                })['catch'](function(err) {
                    console.warn('⚠️ 登录失败，使用本地模式', err);
                    isLogin = false;
                    // 即使登录失败，也尝试加载本地数据
                    loadBottles();
                });
            }

            // ===== 9. 核心功能：投掷 =====
            function throwBottle() {
                var content = newMessageEl.value.trim();
                if (!content && !throwImageData) {
                    status('✍️ 请写点内容或上传图片', false);
                    return;
                }
                var user = getCurrentUser();
                if (!user.className || !user.name || !user.id) {
                    status('⚠️ 请完整填写班级、姓名、学号', false);
                    return;
                }

                status('⏳ 正在投掷...', true);

                var data = {
                    content: content || '(图片消息)',
                    image: throwImageData || null,
                    fromUser: user,
                    replies: [],
                    revealA: false,
                    revealAData: null,
                    createTime: new Date().toISOString()
                };

                db.collection('bottles').add(data).then(function(res) {
                    throwImageData = null;
                    throwPreview.innerHTML = '➕';
                    throwRemoveImage.style.display = 'none';
                    newMessageEl.value = '';
                    status('✅ 漂流瓶已投入树洞！', true);
                    loadBottles();
                    if (adminPanel.classList.contains('open')) renderAdmin();
                })['catch'](function(err) {
                    status('❌ 投掷失败：' + err.message, false);
                });
            }

            // ===== 10. 核心功能：拾取 =====
            function pickBottle() {
                if (!allBottles.length) {
                    status('🌊 还没有瓶子', false);
                    return;
                }
                var user = getCurrentUser();
                var available = [];
                for (var i = 0; i < allBottles.length; i++) {
                    var b = allBottles[i];
                    if (!isSamePerson(user, b.fromUser)) {
                        available.push(b);
                    }
                }
                if (!available.length) {
                    status('😅 没有别人的瓶子', false);
                    return;
                }
                var picked = available[Math.floor(Math.random() * available.length)];
                var hint = picked.image ? ' 📷' : '';
                status('🎯 拾取到瓶子' + hint + '，请回复', true);

                var replyMsg = prompt('📨 你拾取了一个漂流瓶:\n"' + picked.content + '"\n\n输入你的匿名回复:');
                if (replyMsg === null) {
                    status('已取消', false);
                    return;
                }
                var img = replyImageData[picked._id] || null;
                if (replyMsg.trim() === '' && !img) {
                    status('请至少输入文字或选择图片', false);
                    return;
                }
                addReply(picked._id, null, replyMsg.trim() || '(图片)', img);
                delete replyImageData[picked._id];
            }

            // ===== 11. 核心功能：回复 =====
            function addReply(bottleId, threadId, content, image) {
                var bottle = null;
                for (var i = 0; i < allBottles.length; i++) {
                    if (allBottles[i]._id === bottleId) {
                        bottle = allBottles[i];
                        break;
                    }
                }
                if (!bottle) {
                    status('❌ 瓶子不见了', false);
                    return;
                }

                var user = getCurrentUser();
                var reply = {
                    id: genId(),
                    fromUser: user,
                    content: content,
                    image: image || null,
                    threadId: threadId || null,
                    createTime: new Date().toISOString()
                };

                var replies = bottle.replies || [];
                replies.push(reply);

                db.collection('bottles').doc(bottle._id).update({
                    replies: replies
                }).then(function() {
                    status('💬 回复已发送！', true);
                    loadBottles();
                    if (adminPanel.classList.contains('open')) renderAdmin();
                })['catch'](function(err) {
                    status('❌ 回复失败：' + err.message, false);
                });
            }

            // ===== 12. 加载所有瓶子 =====
            function loadBottles() {
                db.collection('bottles')
                    .orderBy('createTime', 'desc')
                    .get()
                    .then(function(res) {
                        allBottles = res.data || [];
                        renderBottles();
                        if (adminPanel.classList.contains('open')) renderAdmin();
                    })['catch'](function(err) {
                        console.warn('⚠️ 加载瓶子失败，使用本地缓存', err);
                        renderBottles();
                    });
            }

            // ===== 13. 渲染瓶子列表 =====
            function renderBottles() {
                if (!allBottles.length) {
                    bottleListEl.innerHTML = '<div class="empty-state">🪸 还没有漂流瓶，来投一个吧</div>';
                    return;
                }
                var user = getCurrentUser();
                var html = '';
                var sorted = allBottles.slice().reverse();

                for (var i = 0; i < sorted.length; i++) {
                    var bottle = sorted[i];
                    var meA = isSamePerson(user, bottle.fromUser);
                    var fromDisplay = getDisplayName(bottle.fromUser, bottle.revealAData);
                    if (meA) fromDisplay += ' 👈 是你';

                    html += '<div class="bubble">';
                    html += '<div class="meta"><span>' + fromDisplay + '</span><span class="badge">#' + (bottle._id ?
                        bottle._id.slice(-4) : '') + '</span></div>';
                    html += '<div class="content">💬 ' + (bottle.content || '') + '</div>';
                    if (bottle.image) html += renderImage(bottle.image, 'bubble-image');

                    // 回复列表
                    if (bottle.replies && bottle.replies.length) {
                        var visible = [];
                        if (meA) {
                            visible = bottle.replies;
                        } else {
                            var myIds = [];
                            for (var j = 0; j < bottle.replies.length; j++) {
                                if (isSamePerson(user, bottle.replies[j].fromUser)) {
                                    myIds.push(bottle.replies[j].id);
                                }
                            }
                            for (var k = 0; k < bottle.replies.length; k++) {
                                var r = bottle.replies[k];
                                if (myIds.indexOf(r.id) !== -1) {
                                    visible.push(r);
                                } else if (isSamePerson(r.fromUser, bottle.fromUser) && myIds.indexOf(r
                                        .threadId) !== -1) {
                                    visible.push(r);
                                }
                            }
                            var seen = {};
                            var temp = [];
                            for (var m = 0; m < visible.length; m++) {
                                if (!seen[visible[m].id]) {
                                    seen[visible[m].id] = true;
                                    temp.push(visible[m]);
                                }
                            }
                            visible = temp;
                            visible.sort(function(a, b) { return (a.createTime || a.id || '').localeCompare(b
                                    .createTime || b.id || ''); });
                        }

                        if (!visible.length) {
                            html += '<div style="margin-top:6px;font-size:12px;color:#6d5380;">⏳ 尚无可见回复</div>';
                        } else {
                            for (var n = 0; n < visible.length; n++) {
                                var reply = visible[n];
                                var isMine = isSamePerson(user, reply.fromUser);
                                var isReplyA = isSamePerson(reply.fromUser, bottle.fromUser);
                                var revealedData = null;
                                if (isReplyA) revealedData = bottle.revealAData;
                                else if (bottle.revealMap && bottle.revealMap[reply.id]) revealedData = bottle
                                    .revealMap[reply.id];
                                var dname = getDisplayName(reply.fromUser, revealedData);
                                var cls = isMine ? 'reply-item mine' : 'reply-item';
                                html += '<div class="' + cls + '">';
                                html += '<div class="rmeta"><span>' + dname + '</span><span class="tag">#' + (reply
                                    .id ? reply.id.slice(-4) : '') + '</span></div>';
                                html += '<div class="rcontent">' + (reply.content || '') + '</div>';
                                if (reply.image) html += renderImage(reply.image, 'reply-image');

                                if (isMine && !isReplyA) {
                                    var isRevealed = bottle.revealMap && bottle.revealMap[reply.id];
                                    if (!isRevealed) {
                                        html += '<div style="margin-top:6px;">' +
                                            '<button class="btn btn-success btn-sm reveal-btn" data-id="' + (bottle
                                                ._id || '') + '" data-replyid="' + (reply.id || '') +
                                            '" data-role="B">🔓 选择揭晓</button>' +
                                            '</div>';
                                    } else {
                                        var rd = bottle.revealMap[reply.id];
                                        var parts3 = [];
                                        if (rd.class) parts3.push('班级');
                                        if (rd.name) parts3.push('姓名');
                                        if (rd.gender) parts3.push('性别');
                                        html += '<div style="margin-top:6px;"><span class="hidden-info">✅ 已揭晓：' +
                                            parts3.join('、') + '</span></div>';
                                    }
                                }

                                html += '</div>';
                            }
                        }
                    } else {
                        html += '<div style="margin-top:6px;font-size:12px;color:#6d5380;">⏳ 暂无回复</div>';
                    }

                    // 操作按钮
                    var hasReplied = false;
                    if (bottle.replies) {
                        for (var p = 0; p < bottle.replies.length; p++) {
                            if (isSamePerson(user, bottle.replies[p].fromUser)) {
                                hasReplied = true;
                                break;
                            }
                        }
                    }
                    var participant = meA || hasReplied;

                    html += '<div class="actions">';
                    if (participant) {
                        html += '<button class="btn btn-ghost btn-sm reply-btn" data-id="' + (bottle._id || '') +
                            '">✍️ 回复</button>';
                        if (bottle.replies && bottle.replies.length) {
                            html += '<button class="btn btn-ghost btn-sm reply-thread-btn" data-id="' + (bottle
                                    ._id || '') + '">💬 回复某条</button>';
                        }
                        if (meA && !bottle.revealA) {
                            html += '<button class="btn btn-success btn-sm reveal-btn" data-id="' + (bottle._id ||
                                '') + '" data-role="A">🔓 选择揭晓</button>';
                        } else if (meA && bottle.revealA) {
                            var rd2 = bottle.revealAData;
                            var parts4 = [];
                            if (rd2 && rd2.class) parts4.push('班级');
                            if (rd2 && rd2.name) parts4.push('姓名');
                            if (rd2 && rd2.gender) parts4.push('性别');
                            html += '<span class="hidden-info">✅ 已揭晓：' + parts4.join('、') + '</span>';
                        }
                    } else {
                        html += '<span style="font-size:11px;color:#8d74a0;">🔒 仅参与者可互动</span>';
                    }
                    html += '</div>';
                    html += '</div>';
                }
                bottleListEl.innerHTML = html;

                // 事件绑定
                var replyBtns = document.querySelectorAll('.reply-btn');
                for (var q = 0; q < replyBtns.length; q++) {
                    replyBtns[q].addEventListener('click', function(e) {
                        e.stopPropagation();
                        var bottleId = this.dataset.id;
                        var content = prompt('💬 输入你的回复内容 (可配图):');
                        if (content === null) return;
                        var img = replyImageData[bottleId] || null;
                        if (content.trim() === '' && !img) {
                            status('请至少输入文字或选择图片', false);
                            return;
                        }
                        addReply(bottleId, null, content.trim() || '(图片)', img);
                        delete replyImageData[bottleId];
                    });
                }

                var threadBtns = document.querySelectorAll('.reply-thread-btn');
                for (var r = 0; r < threadBtns.length; r++) {
                    threadBtns[r].addEventListener('click', function(e) {
                        e.stopPropagation();
                        var bottleId = this.dataset.id;
                        var bottle = null;
                        for (var s = 0; s < allBottles.length; s++) {
                            if (allBottles[s]._id === bottleId) {
                                bottle = allBottles[s];
                                break;
                            }
                        }
                        if (!bottle || !bottle.replies || !bottle.replies.length) {
                            status('没有可回复的条目', false);
                            return;
                        }
                        var user2 = getCurrentUser();
                        var visible2 = [];
                        var meA2 = isSamePerson(user2, bottle.fromUser);
                        if (meA2) {
                            visible2 = bottle.replies;
                        } else {
                            var myIds2 = [];
                            for (var t = 0; t < bottle.replies.length; t++) {
                                if (isSamePerson(user2, bottle.replies[t].fromUser)) {
                                    myIds2.push(bottle.replies[t].id);
                                }
                            }
                            for (var u = 0; u < bottle.replies.length; u++) {
                                var rr = bottle.replies[u];
                                if (myIds2.indexOf(rr.id) !== -1 || isSamePerson(rr.fromUser, bottle.fromUser)) {
                                    visible2.push(rr);
                                }
                            }
                        }
                        if (!visible2.length) {
                            status('没有你可回复的条目', false);
                            return;
                        }
                        var list = '';
                        for (var v = 0; v < visible2.length; v++) {
                            list += (v + 1) + '. ' + (visible2[v].content || '').substring(0, 20) + '... (' + visible2[v]
                                .fromUser.gender + ')\n';
                        }
                        var choice = prompt('选择要回复的条目 (输入编号 1-' + visible2.length + '):\n' + list);
                        if (choice) {
                            var idx = parseInt(choice) - 1;
                            if (idx >= 0 && idx < visible2.length) {
                                var target = visible2[idx];
                                var content2 = prompt('💬 回复: "' + (target.content || '').substring(0, 30) +
                                    '..."\n输入你的回复:');
                                if (content2 === null) return;
                                var img2 = replyImageData[bottleId] || null;
                                if (content2.trim() === '' && !img2) {
                                    status('请至少输入文字或选择图片', false);
                                    return;
                                }
                                addReply(bottleId, target.id, content2.trim() || '(图片)', img2);
                                delete replyImageData[bottleId];
                            } else {
                                status('无效编号', false);
                            }
                        }
                    });
                }

                // 揭晓按钮
                var revealBtns = document.querySelectorAll('.reveal-btn');
                for (var w = 0; w < revealBtns.length; w++) {
                    revealBtns[w].addEventListener('click', function(e) {
                        e.stopPropagation();
                        var bottleId = this.dataset.id;
                        var role = this.dataset.role;
                        var replyId = this.dataset.replyid || null;
                        showRevealModal(bottleId, role, replyId);
                    });
                }
            }

            // ===== 14. 揭晓弹窗 =====
            function showRevealModal(bottleId, role, replyId) {
                var bottle = null;
                for (var i = 0; i < allBottles.length; i++) {
                    if (allBottles[i]._id === bottleId) {
                        bottle = allBottles[i];
                        break;
                    }
                }
                if (!bottle) {
                    status('❌ 瓶子不见了', false);
                    return;
                }
                var user = getCurrentUser();

                if (role === 'A') {
                    if (!isSamePerson(user, bottle.fromUser)) {
                        status('⚠️ 你不是投递者', false);
                        return;
                    }
                    if (bottle.revealA) {
                        status('⚠️ 这条已经揭晓过了', false);
                        return;
                    }
                } else if (role === 'B') {
                    if (!replyId) {
                        status('❌ 缺少回复ID', false);
                        return;
                    }
                    var reply = null;
                    for (var j = 0; j < bottle.replies.length; j++) {
                        if (bottle.replies[j].id === replyId) {
                            reply = bottle.replies[j];
                            break;
                        }
                    }
                    if (!reply) {
                        status('❌ 回复不存在', false);
                        return;
                    }
                    if (!isSamePerson(user, reply.fromUser)) {
                        status('⚠️ 这不是你的回复', false);
                        return;
                    }
                    if (bottle.revealMap && bottle.revealMap[replyId]) {
                        status('⚠️ 这条回复已经揭晓过了', false);
                        return;
                    }
                } else {
                    status('❌ 角色错误', false);
                    return;
                }

                pendingReveal = { bottleId: bottleId, role: role, replyId: replyId, user: user };

                $('revealClassValue').textContent = user.className || '未填写';
                $('revealNameValue').textContent = user.name || '未填写';
                $('revealGenderValue').textContent = user.gender || '未填写';

                $('revealClass').checked = false;
                $('revealName').checked = false;
                $('revealGender').checked = false;
                $('revealError').style.display = 'none';
                $('revealConfirmBtn').disabled = false;

                revealModal.classList.add('open');
            }

            // ===== 15. 揭晓确认 =====
            $('revealConfirmBtn').addEventListener('click', function() {
                var classChecked = $('revealClass').checked;
                var nameChecked = $('revealName').checked;
                var genderChecked = $('revealGender').checked;

                if (!classChecked && !nameChecked && !genderChecked) {
                    $('revealError').style.display = 'block';
                    return;
                }
                $('revealError').style.display = 'none';

                if (!pendingReveal) return;
                var bottleId = pendingReveal.bottleId;
                var role = pendingReveal.role;
                var replyId = pendingReveal.replyId;
                var user = pendingReveal.user;

                var bottle = null;
                for (var i = 0; i < allBottles.length; i++) {
                    if (allBottles[i]._id === bottleId) {
                        bottle = allBottles[i];
                        break;
                    }
                }
                if (!bottle) {
                    status('❌ 瓶子消失了', false);
                    return;
                }

                var revealedInfo = {
                    class: classChecked ? user.className : null,
                    name: nameChecked ? user.name : null,
                    gender: genderChecked ? user.gender : null
                };

                if (role === 'A') {
                    db.collection('bottles').doc(bottle._id).update({
                        revealA: true,
                        revealAData: revealedInfo
                    }).then(function() {
                        var parts = [];
                        if (revealedInfo.class) parts.push('班级');
                        if (revealedInfo.name) parts.push('姓名');
                        if (revealedInfo.gender) parts.push('性别');
                        status('✅ 你已揭晓：' + parts.join('、'), true);
                        loadBottles();
                    })['catch'](function(err) {
                        status('❌ 揭晓失败：' + err.message, false);
                    });
                } else if (role === 'B') {
                    var map = bottle.revealMap || {};
                    map[replyId] = revealedInfo;
                    db.collection('bottles').doc(bottle._id).update({
                        revealMap: map
                    }).then(function() {
                        var parts = [];
                        if (revealedInfo.class) parts.push('班级');
                        if (revealedInfo.name) parts.push('姓名');
                        if (revealedInfo.gender) parts.push('性别');
                        status('✅ 你已揭晓：' + parts.join('、'), true);
                        loadBottles();
                    })['catch'](function(err) {
                        status('❌ 揭晓失败：' + err.message, false);
                    });
                }

                revealModal.classList.remove('open');
                pendingReveal = null;
                if (adminPanel.classList.contains('open')) renderAdmin();
            });

            $('revealCancelBtn').addEventListener('click', function() {
                revealModal.classList.remove('open');
                pendingReveal = null;
                status('已取消揭晓', true);
            });

            revealModal.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('open');
                    pendingReveal = null;
                    status('已取消揭晓', true);
                }
            });

            // ===== 16. 后台管理 =====
            function renderAdmin() {
                if (!allBottles.length) {
                    adminContent.innerHTML = '<p style="color:#6a4f7a;">📭 暂无数据</p>';
                    return;
                }

                var userMap = new Map();
                for (var i = 0; i < allBottles.length; i++) {
                    var b = allBottles[i];
                    var key = b.fromUser.id + '|' + b.fromUser.className;
                    if (!userMap.has(key)) {
                        userMap.set(key, {
                            className: b.fromUser.className,
                            name: b.fromUser.name,
                            id: b.fromUser.id,
                            gender: b.fromUser.gender,
                            role: '投递者',
                            bottleCount: 1
                        });
                    } else {
                        var existing = userMap.get(key);
                        existing.bottleCount += 1;
                    }
                    for (var j = 0; j < (b.replies || []).length; j++) {
                        var r = b.replies[j];
                        var rkey = r.fromUser.id + '|' + r.fromUser.className;
                        if (!userMap.has(rkey)) {
                            userMap.set(rkey, {
                                className: r.fromUser.className,
                                name: r.fromUser.name,
                                id: r.fromUser.id,
                                gender: r.fromUser.gender,
                                role: '回复者',
                                replyCount: 1
                            });
                        } else {
                            var existing2 = userMap.get(rkey);
                            existing2.replyCount = (existing2.replyCount || 0) + 1;
                            if (existing2.role !== '投递者' && existing2.role !== '投递者+回复者') {
                                existing2.role = '回复者';
                            }
                        }
                    }
                }

                var html = '';
                html += '<h3 style="font-size:15px;color:#2a1a38;margin-bottom:8px;">👥 所有参与用户 (' + userMap.size + '人)</h3>';
                html += '<div class="admin-user-grid">';
                var userArray = Array.from(userMap.values());
                for (var k = 0; k < userArray.length; k++) {
                    var u = userArray[k];
                    var roleTag = u.role === '投递者' ? '📤' : u.role === '回复者' ? '📥' : '📤📥';
                    html += '<div class="admin-user-card">';
                    html += '<div class="name">' + u.name + '</div>';
                    html += '<div class="detail">' + u.className + ' · ' + u.gender + '</div>';
                    html += '<div class="detail" style="font-size:11px;color:#7e6193;">学号: ' + u.id + ' · ' + roleTag +
                        '</div>';
                    html += '</div>';
                }
                html += '</div>';

                html += '<hr><h3 style="font-size:15px;color:#2a1a38;margin:12px 0 8px;">📦 所有瓶子及回复</h3>';
                for (var m = 0; m < allBottles.length; m++) {
                    var b2 = allBottles[m];
                    html += '<div class="admin-bottle-item">';
                    html += '<div class="admin-meta">📌 <strong>' + b2.fromUser.name + '</strong> (' + b2.fromUser
                        .className + ' · ' + b2.fromUser.gender + ' · 学号:' + b2.fromUser.id + ')</div>';
                    html += '<div style="font-size:15px;margin-bottom:4px;">💬 ' + b2.content + '</div>';
                    if (b2.image) {
                        html += '<div style="font-size:12px;color:#7e6193;margin-bottom:4px;">📷 有配图</div>';
                    }
                    if (b2.replies && b2.replies.length) {
                        for (var n = 0; n < b2.replies.length; n++) {
                            var r2 = b2.replies[n];
                            var isA2 = isSamePerson(r2.fromUser, b2.fromUser);
                            var label = isA2 ? '↩️ [投递者]' : '↪️ [回复者]';
                            html += '<div class="admin-reply">' + label + ' <strong>' + r2.fromUser.name +
                                '</strong> (' + r2.fromUser.className + ' · ' + r2.fromUser.gender + ' · 学号:' + r2
                                .fromUser.id + ')<br>“' + r2.content + '”';
                            if (r2.image) html += ' <span style="color:#7e6193;">📷</span>';
                            html += '</div>';
                        }
                    } else {
                        html += '<div style="font-size:13px;color:#8d74a0;">暂无回复</div>';
                    }
                    html += '</div>';
                }

                adminContent.innerHTML = html;
            }

            // ===== 17. 清空数据 =====
            function clearAllData() {
                if (!confirm('⚠️ 确定要清空所有数据吗？此操作不可恢复！')) return;
                if (!confirm('🔄 再次确认：真的要删除所有瓶子吗？')) return;

                status('⏳ 正在清空...', true);
                db.collection('bottles').where({
                        _id: _.neq('')
                    })
                    .remove()
                    .then(function() {
                        status('🗑️ 已清空所有数据', true);
                        loadBottles();
                        if (adminPanel.classList.contains('open')) renderAdmin();
                    })['catch'](function(err) {
                        status('❌ 清空失败：' + err.message, false);
                    });
            }

            // ===== 18. 图片上传事件 =====
            throwImageInput.addEventListener('change', function(e) {
                var file = e.target.files[0];
                if (!file) return;
                if (file.size > 5 * 1024 * 1024) {
                    status('⚠️ 图片超过 5MB，请压缩后上传', false);
                    this.value = '';
                    return;
                }
                compressImage(file).then(function(dataUrl) {
                    throwImageData = dataUrl;
                    throwPreview.innerHTML = '<img src="' + dataUrl +
                        '" alt="预览" style="width:100%;height:100%;object-fit:cover;">';
                    throwRemoveImage.style.display = 'inline-block';
                    status('✅ 图片已添加', true);
                })['catch'](function(err) {
                    status('❌ 图片处理失败', false);
                });
                this.value = '';
            });

            throwRemoveImage.addEventListener('click', function() {
                throwImageData = null;
                throwPreview.innerHTML = '➕';
                this.style.display = 'none';
                status('已移除图片', true);
            });

            // ===== 19. 后台按钮 =====
            $('adminToggleBtn').addEventListener('click', function() {
                if (adminPanel.classList.contains('open')) {
                    adminPanel.classList.remove('open');
                    this.textContent = '🔐 后台';
                    return;
                }
                var pwd = prompt('🔐 请输入后台密码:');
                if (pwd === null) {
                    status('已取消', true);
                    return;
                }
                if (pwd !== ADMIN_PASSWORD) {
                    status('❌ 密码错误', false);
                    return;
                }
                adminPanel.classList.add('open');
                this.textContent = '🔐 关闭后台';
                renderAdmin();
                status('✅ 后台已解锁', true);
            });

            $('adminCloseBtn').addEventListener('click', function() {
                adminPanel.classList.remove('open');
                $('adminToggleBtn').textContent = '🔐 后台';
            });

            $('clearDataBtn').addEventListener('click', clearAllData);

            // ===== 20. 保存用户信息 =====
            var userFields = ['userClass', 'userName', 'userId', 'userGender'];
            for (var f = 0; f < userFields.length; f++) {
                (function(fieldId) {
                    var el = $(fieldId);
                    var saved = localStorage.getItem('user_' + fieldId);
                    if (saved) el.value = saved;
                    el.addEventListener('change', function() {
                        localStorage.setItem('user_' + fieldId, this.value);
                    });
                })(userFields[f]);
            }

            // ===== 21. 按钮事件 =====
            throwBtn.addEventListener('click', throwBottle);
            pickBtn.addEventListener('click', pickBottle);

            // ===== 22. 启动 =====
            status('🔄 正在连接云端...', true);
            login();

            window.__app = app;
            window.__db = db;

            console.log('✅ 漂流瓶已启动，环境 ID: bottle-d9gpcqa9hbcbcfc0c-144');

        })();
    </script>

</body>
</html>
